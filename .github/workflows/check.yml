name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest ruff jsonschema
      - name: Lint (ruff check)
        run: ruff check scripts/ tests/
      - name: Format (ruff format --check)
        run: ruff format --check scripts/ tests/
      - name: Test (pytest)
        run: python3 -m pytest tests/ -q

  convergence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hotspot/growth audits mine full git history (shallow clone errors them -> stale accepts)
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install leaf toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage==7.14.1 lizard==1.23.0 radon==6.0.1 \
            vulture==2.16 ruff==0.15.16 mypy==2.1.0 bandit==1.9.4 pylint==3.3.9 \
            astroid==3.3.11 perflint==0.8.1
          python -m pip install pytest jsonschema  # coverage-gap gate suite
      - name: Clone leaves + runner at pinned tags
        run: |
          git clone --depth 1 --branch v0.7.2 https://github.com/jc1122/repo-audit-skills.git /tmp/leaves
          (cd /tmp/leaves && npm ci)   # jscpd for the duplication leaf (L1)
          test -x /tmp/leaves/node_modules/.bin/jscpd || (echo "jscpd missing" && exit 1)
          git clone --depth 1 --branch v0.8.1 https://github.com/jc1122/repo-audit-refactor-optimize.git /tmp/runner
          echo "/tmp/leaves/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Convergence gate (Tier-1 wave)
        env:
          WAVE_RUNNER: /tmp/runner/scripts/run_diagnosis_wave.py
          SKILLS_ROOT: /tmp/leaves/skills
        run: python3 scripts/check_wave_baseline.py   # real exit code, not piped (L4)
      - name: Coverage-gap gate (Tier-1 graduation)
        env:
          LEAF: /tmp/leaves/skills/coverage-gap-audit/scripts/coverage_gap_audit.py
        run: >-
          python3 scripts/check_coverage_gap.py --subprocess-capture
          --suite tests --suite perf-optimization/tests
          --source-prefix scripts --source-prefix perf-optimization/scripts
